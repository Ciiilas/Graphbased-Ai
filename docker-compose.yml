services:
  neo4j:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphbased-ai-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/graphbased-ai
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/import:/var/lib/neo4j/import
      - ./neo4j/plugins:/plugins
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p graphbased-ai 'RETURN 1' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  chroma:
    image: chromadb/chroma:1.5.9
    container_name: graphbased-ai-chroma
    ports:
      - "8001:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /data
    volumes:
      - ./local-data/chroma:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/heartbeat')\" || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
